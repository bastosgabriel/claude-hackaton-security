services:
  db:
    image: postgis/postgis:16-3.4
    container_name: hackaton_postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hackaton}
      POSTGRES_USER: ${DB_USER:-hackaton}
      POSTGRES_PASSWORD: ${DB_PASS:-hackaton}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hackaton} -d ${DB_NAME:-hackaton}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgis_data:
